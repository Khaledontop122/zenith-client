name: Build Zenith Client

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build
        run: gradle --no-daemon build

      - name: Upload Zenith Client jar
        uses: actions/upload-artifact@v4
        with:
          name: Zenith-Client-${{ github.sha }}
          path: |
            build/libs/zenithclient-*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
          if-no-files-found: error
